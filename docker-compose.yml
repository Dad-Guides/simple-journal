services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: journal
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: CHANGE_ME        # ← set a strong password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal"]
      interval: 5s
      timeout: 3s
      retries: 5

  journal-web:
    image: ghcr.io/dad-guides/simple-journal:latest
    build:
      context: ./journal-web
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://journal:CHANGE_ME@db:5432/journal  # ← same password
      SESSION_COOKIE_SECURE: "false"   # set to "true" if behind HTTPS
      # AI provider — or configure via the Settings page in the app (no restart needed)
      # AI_BASE_URL: http://your-ai-host:11434/v1
      # AI_MODEL: mistral:latest
      # AI_API_KEY: ""
    ports:
      - "3003:3003"
    volumes:
      - journal-data:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  journal-data:
